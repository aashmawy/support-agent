name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Deterministic (no API key needed) ──────────────────────────────
  lint-and-unit:
    name: Lint and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install -e ".[dev]"
          pip install ruff
      - name: Lint
        run: ruff check app tests scripts
      - name: Unit tests
        run: pytest tests/unit -v --tb=short
      - name: Property tests
        run: pytest tests/property -v --tb=short

  component-and-integration:
    name: Component and integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: python -m pip install -e ".[dev]"
      - name: Init DB (fixtures)
        run: python scripts/init_db.py
      - name: Component tests
        run: pytest tests/component -v --tb=short
      - name: Integration tests
        run: pytest tests/integration -v --tb=short

  # ── Gate: detect whether OPENAI_API_KEY secret is configured ───────
  check-secrets:
    name: Check secrets
    runs-on: ubuntu-latest
    outputs:
      has-api-key: ${{ steps.check.outputs.has-key }}
    steps:
      - id: check
        env:
          KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "has-key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-key=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Deterministic: Trajectly contract checks (uses committed baselines) ──
  trajectly-smoke:
    name: Trajectly contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: python -m pip install -e ".[dev]"
      - name: Init DB
        run: python scripts/init_db.py
      - name: Trajectly contract checks
        uses: trajectly/trajectly-action@v1
        with:
          spec_glob: "trajectly/specs/*.agent.yaml"
          project_root: "."

  # ── API-dependent (skipped when secret is not set) ─────────────────
  full-evals:
    name: Promptfoo evals (main)
    runs-on: ubuntu-latest
    needs: check-secrets
    if: github.ref == 'refs/heads/main' && needs.check-secrets.outputs.has-api-key == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python deps
        run: python -m pip install -e ".[dev]"
      - name: Init DB
        run: python scripts/init_db.py
      - name: Promptfoo evals
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx promptfoo@latest eval -c evals/promptfoo.yaml

  garak-smoke:
    name: Garak smoke (main)
    runs-on: ubuntu-latest
    needs: check-secrets
    if: github.ref == 'refs/heads/main' && needs.check-secrets.outputs.has-api-key == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install garak
        run: python -m pip install garak
      - name: Garak smoke
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: make eval-garak
