schema_version: "0.4"
name: "support-agent-enterprise-escalation"
command: "python -m trt_adapters.enterprise_escalation"
workdir: ../..
fixture_policy: by_hash
strict: true
budget_thresholds:
  max_tool_calls: 4
  max_tokens: 500
contracts:
  tools:
    allow: [escalate_ticket]
    deny: []
  sequence:
    require: [tool:escalate_ticket]
