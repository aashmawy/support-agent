schema_version: "0.4"
name: "support-agent-invoice-lookup"
command: "python -m trt_adapters.invoice_lookup"
workdir: ../..
fixture_policy: by_hash
strict: true
budget_thresholds:
  max_tool_calls: 4
  max_tokens: 500
contracts:
  tools:
    allow: [check_invoice_status]
    deny: []
  sequence:
    require: [tool:check_invoice_status]
